<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OG Image - Carol Royse Team</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .og-container {
      width: 1200px;
      height: 630px;
    }
  </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-8">

  <!-- OG Image Container -->
  <div class="og-container bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 flex flex-col justify-center items-center text-white p-16 relative overflow-hidden">
    <!-- Background pattern -->
    <div class="absolute inset-0 opacity-10">
      <div class="absolute top-0 right-0 w-96 h-96 bg-green-500 rounded-full blur-3xl transform translate-x-1/2 -translate-y-1/2"></div>
      <div class="absolute bottom-0 left-0 w-96 h-96 bg-blue-500 rounded-full blur-3xl transform -translate-x-1/2 translate-y-1/2"></div>
    </div>
    
    <!-- Content -->
    <div class="relative z-10 text-center">
      <!-- Icon -->
      <div class="w-24 h-24 bg-green-600 rounded-2xl flex items-center justify-center mx-auto mb-8 shadow-2xl">
        <span class="text-5xl">🏠</span>
      </div>
      
      <!-- Headline -->
      <h1 class="text-6xl font-extrabold mb-6 leading-tight">
        Join Arizona's<br>
        <span class="text-green-400">#1 Real Estate Team</span>
      </h1>
      
      <!-- Subheadline -->
      <p class="text-3xl text-gray-300 mb-8 font-semibold">
        Guaranteed $100K+ Your First Year
      </p>
      
      <!-- CTA -->
      <div class="inline-block bg-green-600 text-white px-8 py-4 rounded-xl text-2xl font-bold shadow-xl">
        Apply Now →
      </div>
      
      <!-- Bottom text -->
      <p class="text-xl text-gray-400 mt-8">
        No Cold Calling • Pre-Qualified Appointments • Full Support
      </p>
    </div>
  </div>

</body>
</html>
